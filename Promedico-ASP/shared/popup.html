<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
    }
    h2 {
      margin: 0 0 15px 0;
      font-size: 16px;
      color: #333;
    }
    .toggle-container {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .toggle-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 10px;
    }
    .toggle-row .switch {
      flex-shrink: 0;
      margin-top: 2px;
    }
    .toggle-row:last-child {
      margin-bottom: 0;
    }
    .toggle-label {
      font-weight: 500;
      color: #333;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #4CAF50;
    }
    input:checked + .slider:before {
      transform: translateX(26px);
    }
    .status {
      text-align: center;
      padding: 10px;
      background: #e8f5e9;
      border-radius: 5px;
      color: #2e7d32;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }
    .status.show {
      display: block;
    }
    .status.error {
      background: #ffebee;
      color: #c62828;
    }
    .script-description {
      font-size: 11px;
      color: #666;
      margin-top: 3px;
    }
    .master-toggle {
      border-bottom: 2px solid #ddd;
      padding-bottom: 15px;
      margin-bottom: 15px;
    }
    .master-toggle .toggle-label {
      font-size: 15px;
      font-weight: 600;
      color: #1976d2;
    }
    #scriptsContainer {
      /* Will be populated dynamically */
    }
    .version-info {
      text-align: center;
      padding: 10px;
      font-size: 11px;
      color: #666;
      border-top: 1px solid #e0e0e0;
      margin-top: 10px;
      background: #f9f9f9;
    }
    .version-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-weight: 500;
    }
    .version-production {
      background: #d4edda;
      color: #155724;
    }
    .version-debug {
      background: #f8d7da;
      color: #721c24;
      animation: blink 2s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Regio-balk */
    #regioBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #eef4ff;
      border: 1px solid #c5d8f8;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 10px;
      font-size: 12px;
    }
    #regioBar span { color: #444; }
    #btnWisselRegio {
      font-size: 11px;
      padding: 3px 8px;
      border: 1px solid #90b4e8;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      color: #1a5bb5;
    }

    /* Instellingen-balk (export / import / tip) */
    .settings-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }
    .settings-bar button {
      flex: 1;
      padding: 7px 6px;
      border-radius: 5px;
      border: 1px solid #d0d0d0;
      background: #fff;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      color: #333;
      white-space: nowrap;
    }
    .settings-bar button:hover { background: #f0f0f0; }
    .settings-bar .btn-tip {
      color: #888;
      border-color: #e0e0e0;
      font-weight: 400;
    }
    .settings-bar .btn-tip:hover { color: #555; background: #f8f8f8; }
  </style>
</head>
<body>
  <h2>Promedico ASP Helper</h2>
  
  <div class="toggle-container">
    <div class="toggle-row master-toggle">
      <div>
        <div class="toggle-label">Zet alle scripts aan</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="masterToggle">
        <span class="slider"></span>
      </label>
    </div>
    
    <div id="scriptsContainer"></div>
  </div>
  
  <div id="regioBar">
    <span>🏥 <strong id="regioLabel">—</strong></span>
    <button id="btnWisselRegio">Wijzig</button>
  </div>

  <!-- Export / Import / Tip -->
  <div class="settings-bar">
    <button id="btnExport">⬇ Exporteer</button>
    <button id="btnImport">⬆ Importeer</button>
    <button class="btn-tip" id="btnTip">💬 Mis je iets?</button>
  </div>

  <div id="status" class="status"></div>

  <div class="version-info">
    <div>
      <span class="version-badge" id="versionBadge">v0.0.0</span>
    </div>
    <div style="font-size: 10px; color: #999; margin-top: 5px;" id="installInfo"></div>
  </div>

  <!-- Verborgen file-input voor import -->
  <input type="file" id="importFileInput" accept=".json" style="display:none">
  
  <script src="config.js"></script>
  <script src="profiles.js"></script>
  <script src="zorgdomein-instellingen.js"></script>
  <script src="popup.js"></script>
</body>
</html>
